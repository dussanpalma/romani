<div style="position: relative;">
  <!-- Bell Button -->
  <button
    (click)="toggleDropdown()"
    style="
      position: relative;
      background: transparent;
      border: none;
      cursor: pointer;
      padding: 8px;
      display: flex;
      align-items: center;
      justify-content: center;
      border-radius: 10px;
      transition: all 0.2s;
    "
    [style.background]="showDropdown ? 'rgba(99, 102, 241, 0.1)' : 'transparent'"
  >
    <!-- Bell Icon -->
    <svg
      style="width: 24px; height: 24px; color: #6366f1;"
      fill="none"
      stroke="currentColor"
      viewBox="0 0 24 24"
    >
      <path
        stroke-linecap="round"
        stroke-linejoin="round"
        stroke-width="2"
        d="M15 17h5l-1.405-1.405A2.032 2.032 0 0118 14.158V11a6.002 6.002 0 00-4-5.659V5a2 2 0 10-4 0v.341C7.67 6.165 6 8.388 6 11v3.159c0 .538-.214 1.055-.595 1.436L4 17h5m6 0v1a3 3 0 11-6 0v-1m6 0H9"
      ></path>
    </svg>

    <!-- Notification Badge -->
    <div
      *ngIf="unreadCount > 0"
      style="
        position: absolute;
        top: -4px;
        right: -4px;
        width: 24px;
        height: 24px;
        background: linear-gradient(135deg, #ef4444 0%, #dc2626 100%);
        color: white;
        border-radius: 50%;
        display: flex;
        align-items: center;
        justify-content: center;
        font-size: 12px;
        font-weight: 700;
        box-shadow: 0 4px 12px rgba(239, 68, 68, 0.4);
        border: 2px solid white;
      "
    >
      {{ unreadCount > 9 ? '9+' : unreadCount }}
    </div>
  </button>

  <!-- Dropdown Panel -->
  <div
    *ngIf="showDropdown"
    style="
      position: absolute;
      top: 100%;
      right: 0;
      margin-top: 8px;
      width: 380px;
      background: white;
      border-radius: 16px;
      box-shadow: 0 20px 60px rgba(0, 0, 0, 0.15);
      z-index: 1000;
      max-height: 500px;
      overflow: hidden;
      display: flex;
      flex-direction: column;
    "
  >
    <!-- Header -->
    <div
      style="
        padding: 16px;
        border-bottom: 1px solid rgba(0, 0, 0, 0.1);
        background: linear-gradient(135deg, rgba(99, 102, 241, 0.05) 0%, rgba(139, 92, 246, 0.05) 100%);
        display: flex;
        align-items: center;
        justify-content: space-between;
      "
    >
      <h3 style="margin: 0; font-size: 14px; font-weight: 700; color: #1e293b;">
        Notificaciones de Citas
      </h3>
      <button
        (click)="clearAll()"
        *ngIf="notifications.length > 0"
        style="
          background: transparent;
          border: none;
          color: #6366f1;
          cursor: pointer;
          font-size: 12px;
          font-weight: 600;
          padding: 0;
          transition: all 0.2s;
        "
      >
        Limpiar todo
      </button>
    </div>

    <!-- Notifications List -->
    <div
      style="
        overflow-y: auto;
        flex: 1;
        max-height: 400px;
      "
    >
      <div *ngIf="notifications.length === 0" style="padding: 32px 16px; text-align: center;">
        <div style="font-size: 40px; margin-bottom: 8px;">✨</div>
        <p style="margin: 0; font-size: 14px; color: #64748b; font-weight: 500;">
          No hay notificaciones
        </p>
        <p style="margin: 4px 0 0; font-size: 12px; color: #94a3b8;">
          Todos al día con las citas
        </p>
      </div>

      <div
        *ngFor="let notification of notifications"
        [ngStyle]="getNotificationStyle(notification)"
        style="
          padding: 12px 16px;
          border-bottom: 1px solid rgba(0, 0, 0, 0.05);
          display: flex;
          gap: 12px;
          align-items: flex-start;
          transition: all 0.2s;
          cursor: pointer;
        "
        (mouseenter)="setHoveredNotification(notification.id)"
        (mouseleave)="setHoveredNotification(null)"
      >
        <!-- Icon -->
        <div
          style="
            font-size: 20px;
            margin-top: 2px;
            flex-shrink: 0;
          "
        >
          {{ getNotificationIcon(notification) }}
        </div>

        <!-- Content -->
        <div style="flex: 1; min-width: 0;">
          <p
            style="
              margin: 0 0 4px 0;
              font-size: 13px;
              font-weight: 600;
              color: #1e293b;
              word-break: break-word;
            "
          >
            {{ notification.message }}
          </p>
          <p
            *ngIf="notification.student.comentarios && notification.student.comentarios.length > 0"
            style="
              margin: 0;
              font-size: 11px;
              color: #64748b;
              overflow: hidden;
              text-overflow: ellipsis;
              white-space: nowrap;
            "
          >
            Teléfono: {{ notification.student.telefono }}
          </p>
        </div>

        <!-- Close Button -->
        <button
          (click)="removeNotification(notification.id)"
          style="
            background: transparent;
            border: none;
            color: #94a3b8;
            cursor: pointer;
            padding: 0;
            flex-shrink: 0;
            font-size: 16px;
            transition: all 0.2s;
          "
        >
          ✕
        </button>
      </div>
    </div>
  </div>

  <!-- Click outside to close -->
  <div
    *ngIf="showDropdown"
    style="
      position: fixed;
      top: 0;
      left: 0;
      right: 0;
      bottom: 0;
      z-index: 999;
    "
    (click)="closeDropdown()"
  ></div>
</div>
