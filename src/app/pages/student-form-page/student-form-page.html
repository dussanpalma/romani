<div class="form-container">
  <!-- Header -->
  <header class="form-header">
    <div class="header-left">
      <button class="btn-back" (click)="onCancel()">←</button>
      <h1>{{ isEditing ? '✏️ Editar Contacto' : '➕ Nuevo Contacto' }}</h1>
    </div>
    <div class="header-right">
      @if (isEditing) {
        <button type="button" class="btn-danger" (click)="onDelete()">🗑️ Eliminar</button>
      }
      <button type="button" class="btn-secondary" (click)="onCancel()">Cancelar</button>
      <button type="button" [disabled]="!isFormValid()" class="btn-primary" (click)="onSubmit()">💾 Guardar</button>
    </div>
  </header>

  <!-- Form Content -->
  <main class="form-main">
    <form (ngSubmit)="onSubmit()">
      
      <!-- Basic Information -->
      <section class="form-section">
        <h2>Información Básica</h2>
        
        <div class="form-row">
          <div class="form-group">
            <label>Nombre *</label>
            <input 
              [(ngModel)]="formData.nombre" 
              name="nombre" 
              type="text" 
              placeholder="Ej: Juan"
              required
            />
          </div>
          <div class="form-group">
            <label>Apellido *</label>
            <input 
              [(ngModel)]="formData.apellido" 
              name="apellido" 
              type="text" 
              placeholder="Ej: García"
              required
            />
          </div>
        </div>

        <div class="form-row">
          <div class="form-group">
            <label>Email *</label>
            <input 
              [(ngModel)]="formData.email" 
              name="email" 
              type="email" 
              placeholder="correo@ejemplo.com"
              required
            />
          </div>
          <div class="form-group">
            <label>WhatsApp *</label>
            <input 
              [(ngModel)]="formData.whatsapp" 
              name="whatsapp" 
              type="tel" 
              placeholder="Ej: +34612345678"
              required
            />
          </div>
        </div>

        <div class="form-row">
          <div class="form-group">
            <label>Instagram</label>
            <input 
              [(ngModel)]="formData.instagram" 
              name="instagram" 
              type="text" 
              placeholder="Ej: @usuario_instagram"
            />
          </div>
          <div class="form-group">
            <label>Barrio</label>
            <input 
              [(ngModel)]="formData.barrio" 
              name="barrio" 
              type="text" 
              placeholder="Ej: Centro, Zona Norte"
            />
          </div>
        </div>
      </section>

      <!-- Sales Information -->
      <section class="form-section">
        <h2>💰 Información de Ventas</h2>
        
        <div class="form-row">
          <div class="form-group">
            <label>Monto Vendido (COP)</label>
            <input 
              [(ngModel)]="formData.ventas" 
              name="ventas" 
              type="number" 
              placeholder="Ej: 50000"
              min="0"
            />
          </div>
        </div>
      </section>

      <!-- Categories -->
      <section class="form-section">
        <h2>Categorías *</h2>
        <p class="section-help">Selecciona una o varias categorías (mínimo 1 requerida)</p>
        
        <div class="categories-list">
          @for (category of categories; track category.name) {
            <label class="category-checkbox" [class.active]="isCategorySelected(category.name)">
              <input 
                type="checkbox" 
                [checked]="isCategorySelected(category.name)"
                (change)="toggleCategory(category.name)"
              />
              <span class="checkbox-label">{{ category.label }}</span>
              <span class="checkbox-description">{{ category.description }}</span>
            </label>
          }
        </div>
      </section>

      <!-- Form Actions -->
      <div class="form-actions">
        @if (isEditing) {
          <button type="button" class="btn-secondary" (click)="onClear()">↻ Descartar cambios</button>
        }
        <div class="actions-right">
          <button type="button" class="btn-secondary" (click)="onCancel()">Cancelar</button>
          <button type="button" [disabled]="!isFormValid()" class="btn-primary" (click)="onSubmit()">
            {{ isEditing ? '✏️ Actualizar' : '➕ Crear Contacto' }}
          </button>
        </div>
      </div>

    </form>
  </main>
</div>
